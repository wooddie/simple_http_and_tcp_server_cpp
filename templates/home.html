<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НейроӨнер — Кабинет</title>
    <link rel="stylesheet" href="styles/home_style.css">
</head>
<body>

<div class="app"> <header class="header">
    <div class="header-top">
        <div class="logo">Neuro<span>Art</span></div>
        <div class="header-right">
            <div class="lang-btns">
                <button onclick="changeTheme(this)" id="theme-toggle" class="lang-btn">🌙</button>
                <button onclick="setLanguage('kz')" class="lang-btn">KZ</button>
                <button onclick="setLanguage('ru')" class="lang-btn">RU</button>
            </div>
            <a href="/" class="exit-link" onclick="logout(event)" title="Exit">🚪</a>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="showSection('new')" data-key="nav_create">➕ Тапсырыс</button>
        <button class="nav-btn" onclick="showSection('list')" data-key="nav_projects">📂 Жобалар</button>
    </div>
</header>

    <main class="content">
        <section id="new" class="section visible">
            <div class="card">
                <div class="card-title" data-key="new_order">Жаңа тапсырыс</div>
                <form action="/generate" method="POST">
                    <input type="hidden" name="user_id" value="{{user_id}}">

                    <label for="type" data-key="type_label">Контент түрі</label>
                    <select name="type" id="type">
                        <option value="Изображение" data-key="opt_img">Сурет</option>
                        <option value="Видео" data-key="opt_vid">Бейне</option>
                    </select>

                    <label for="prompt" data-key="prompt_label">Сипаттама</label>
                    <textarea name="prompt" id="prompt" placeholder="..." required></textarea>

                    <button type="submit" data-key="btn_send">Жіберу</button>
                </form>
            </div>
        </section>

        <section id="list" class="section">
            <div class="section-title" data-key="projects_title">Менің жобаларым</div>
            <div class="list-container">
                {{requests}}
            </div>
        </section>
    </main>
</div>

<script src="scripts/home_script.js"></script>
<script src="scripts/theme.js"></script>

</body>
</html>
