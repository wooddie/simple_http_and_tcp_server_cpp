<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Auth</title>
</head>
<body>
<div style="max-width: 300px; margin: auto;">
  <h2>Вход</h2>
  <form action="/login" method="POST">
    <input name="email" type="email" placeholder="Почта" required><br><br>
    <input name="password" type="password" placeholder="Пароль" required><br><br>
    <button type="submit">Войти</button>
  </form>

  <hr>

  <h2>Регистрация</h2>
  <form action="/register" method="POST">
    <input name="iin" placeholder="ИИН"><br><br>
    <input name="fio" placeholder="ФИО"><br><br>
    <input name="phone" placeholder="Телефон"><br><br>
    <input name="email" type="email" placeholder="Почта"><br><br>
    <input name="password" type="password" placeholder="Пароль"><br><br>
    <button type="submit">Зарегистрироваться</button>
  </form>
</div>
</body>
</html>
